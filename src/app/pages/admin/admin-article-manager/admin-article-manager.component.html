<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-900">Article Manager</h1>
    <div class="mt-4 flex justify-between items-center">
      <p class="text-gray-600">View and manage articles</p>
      <button (click)="openCreateModal()"
        class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors">
        Add New Article
      </button>
    </div>
  </div>

  <!-- Articles Table using Common Table Component -->
  <app-common-table [data]="articles" [columns]="tableColumns" tableName="articles" [loading]="loading" [error]="error"
    [paginationConfig]="{
      currentPage: currentPage,
      pageSize: pageSize,
      totalItems: totalCount,
      totalPages: totalPages
    }" [filterConfig]="{
      searchTerm: searchTerm,
      filters: { status: statusFilter }
    }" [showActions]="true" [rowActions]="[
      { name: 'view', title: 'View', color: 'blue' },
      { name: 'edit', title: 'Edit', color: 'indigo' },
      { name: 'delete', title: 'Delete', color: 'red' }
    ]" (action)="handleAction($event.name, $event.item)" (pageChange)="onPageChange($event)"
    (filterChange)="onFilterChange($event)">
  </app-common-table>

  <!-- Create/Edit Article Modal -->
  <div *ngIf="showModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-2xl mx-4">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold">
          {{ editingArticle ? 'Edit Article' : 'Create Article' }}
        </h3>
        <button (click)="closeModal()" class="text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form (ngSubmit)="editingArticle ? updateArticle() : createArticle()" #articleForm="ngForm">
        <div class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
              <input type="text" [(ngModel)]="articleFormModel.title" name="title" required
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Article title">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
              <select [(ngModel)]="articleFormModel.categoryId" name="categoryId"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Select a category</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Author</label>
            <select [(ngModel)]="articleFormModel.authorId" name="authorId"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">Select an author</option>
              <option *ngFor="let author of authors" [value]="author.id">{{ author.name }}</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Content *</label>
            <textarea [(ngModel)]="articleFormModel.content" name="content" required
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Article content" rows="6"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Excerpt</label>
              <textarea [(ngModel)]="articleFormModel.excerpt" name="excerpt"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Article excerpt" rows="3"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Tags</label>
              <input type="text" [(ngModel)]="articleFormModel.tags" name="tags"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Comma-separated tags">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
              <input type="text" [(ngModel)]="articleFormModel.imageUrl" name="imageUrl"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Article image URL">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
              <select [(ngModel)]="articleFormModel.status" name="status"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="archived">Archived</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Meta Title</label>
            <input type="text" [(ngModel)]="articleFormModel.metaTitle" name="metaTitle"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Meta title for SEO">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Meta Description</label>
            <textarea [(ngModel)]="articleFormModel.metaDescription" name="metaDescription"
              class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Meta description for SEO" rows="2"></textarea>
          </div>

          <div class="flex items-center">
            <input type="checkbox" [(ngModel)]="articleFormModel.isFeatured" name="isFeatured" id="isFeatured"
              class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
            <label for="isFeatured" class="ml-2 block text-sm text-gray-700">Featured Article</label>
          </div>
        </div>

        <div class="mt-6 flex justify-end space-x-3">
          <button type="button" (click)="closeModal()"
            class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
            Cancel
          </button>
          <button type="submit" [disabled]="!articleForm.form.valid"
            class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed">
            {{ editingArticle ? 'Update Article' : 'Create Article' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <app-confirm-dialog [isOpen]="showConfirmDialog" [title]="confirmDialogTitle" [message]="confirmDialogMessage"
    [confirmButtonText]="confirmDialogConfirmText" [cancelButtonText]="confirmDialogCancelText"
    (confirmed)="onConfirmDelete()" (cancelled)="onCancelDelete()">
  </app-confirm-dialog>
</div>
